services:
  - type: web
    name: sharesharp
    runtime: node
    repo: https://github.com/YOUR_USER/YOUR_REPO
    region: oregon
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: auto
