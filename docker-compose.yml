services:
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - CORS_ORIGIN=http://localhost:80
      - PORT=3000
      - TURN_SECRET=sharesharp-turn-secret
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  turn:
    image: coturn/coturn:latest
    container_name: sharesharp-turn
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
    command: >
      -n
      --realm=sharesharp.local
      --listening-port=3478
      --min-port=49152
      --max-port=65535
      --fingerprint
      --lt-cred-mech
      --use-auth-secret
      --static-auth-secret=sharesharp-turn-secret
      --no-cli
      --no-tlsv1
      --no-tlsv1_1
      --no-multicast-peers
    restart: unless-stopped
